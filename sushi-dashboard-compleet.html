<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Sushi Boutique – Dashboard</title>

<!-- ════════════════════════════════════════════════
     FIREBASE CONFIGURATIE
     Stap 1: Ga naar console.firebase.google.com
     Stap 2: Maak een project aan → Realtime Database
     Stap 3: Projectinstellingen → Web app → kopieer config
     Stap 4: Vervang de waarden hieronder met jouw eigen config
     ════════════════════════════════════════════════ -->
<script type="module">
  import { initializeApp }              from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyByabr9VctlCTD51u7QZdDc37knQesRQAs",
    authDomain:        "the-sushi-boutique-medewerker.firebaseapp.com",
    databaseURL:       "https://the-sushi-boutique-medewerker-default-rtdb.europe-west1.firebasedatabase.app",
    projectId:         "the-sushi-boutique-medewerker",
    storageBucket:     "the-sushi-boutique-medewerker.firebasestorage.app",
    messagingSenderId: "329960344063",
    appId:             "1:329960344063:web:ed8840071f0a23241d7fca"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // Maak Firebase beschikbaar voor de rest van de app
  window._fbSave = async (path, data) => {
    await set(ref(db, path), data);
  };
  window._fbLoad = async (path) => {
    const snap = await get(ref(db, path));
    return snap.exists() ? snap.val() : null;
  };
  window._fbReady = true;
  document.dispatchEvent(new Event('firebase-ready'));
</script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { min-height: 100%; background: #fff; font-family: -apple-system, 'Segoe UI', sans-serif; color: #1A1A1A; }
:root {
  --gold:#B8963E; --gold-bg:#FDF8EE; --gold-bdr:#D4AC5A; --gold-txt:#7A5C10;
  --green-bg:#E8F5E9; --green-bdr:#A5D6A7; --green-txt:#2E7D32;
  --red:#c0392b; --red-bg:#FFF8F8; --red-bdr:#E57373;
  --surface:#F7F7F5; --border:rgba(0,0,0,0.10); --muted:#666; --hint:#999;
}
.screen { display:none; }
.screen.active { display:flex; flex-direction:column; min-height:100vh; }

/* LOGIN */
#login { align-items:center; justify-content:center; padding:2.5rem 1.5rem; }
.login-inner { width:100%; max-width:400px; display:flex; flex-direction:column; align-items:center; gap:1.75rem; }
.brand-sub  { font-size:11px; letter-spacing:4px; color:var(--gold); text-transform:uppercase; font-weight:600; text-align:center; }
.brand-name { font-size:28px; font-weight:300; letter-spacing:2px; text-align:center; margin:4px 0; }
.pin-dots { display:flex; gap:16px; justify-content:center; }
.dot { width:14px; height:14px; border-radius:50%; border:1.5px solid var(--gold); background:transparent; transition:background .15s; }
.dot.filled { background:var(--gold); }
.pin-err { font-size:13px; color:var(--red); min-height:18px; text-align:center; margin-top:5px; }
.pad { display:grid; grid-template-columns:repeat(3,78px); gap:12px; }
.pbtn { width:78px; height:78px; border-radius:50%; border:0.5px solid rgba(0,0,0,0.12); background:#fff; font-size:22px; font-weight:400; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .1s,transform .1s; }
.pbtn:active { background:#F5E6C8; transform:scale(.93); }
.pbtn.sm { font-size:13px; color:var(--muted); }
.login-hint { font-size:12px; color:var(--hint); text-align:center; line-height:1.9; }

/* APP */
#app { flex-direction:column; }
.app-header { display:flex; justify-content:space-between; align-items:center; padding:.875rem 1rem; border-bottom:0.5px solid var(--border); background:#fff; position:sticky; top:0; z-index:10; }
.header-left .role-tag { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--gold); font-weight:600; }
.header-left .uname    { font-size:15px; font-weight:500; }
.out-btn { font-size:13px; color:var(--muted); background:none; border:0.5px solid var(--border); border-radius:8px; padding:7px 14px; cursor:pointer; }
.app-content { flex:1; padding:1rem 1rem 90px; max-width:720px; width:100%; margin:0 auto; }

/* BOTTOM NAV */
.bottom-nav { position:fixed; bottom:0; left:0; right:0; height:68px; background:#fff; border-top:0.5px solid var(--border); display:flex; z-index:20; }
.bnav-btn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; border:none; background:none; cursor:pointer; font-size:11px; color:var(--hint); font-weight:500; padding-bottom:env(safe-area-inset-bottom,0); }
.bnav-btn.active { color:var(--gold); }
.bnav-btn svg { width:22px; height:22px; stroke:#999; }
.bnav-btn.active svg { stroke:var(--gold); }

/* MODULE TABS */
.mod-tab-row { display:flex; gap:6px; margin-bottom:1rem; flex-wrap:wrap; }
.mod-tab { padding:7px 15px; border-radius:20px; border:0.5px solid var(--border); font-size:13px; color:var(--muted); cursor:pointer; background:none; white-space:nowrap; }
.mod-tab.on { background:var(--gold); border-color:var(--gold); color:#fff; }

/* SHARED */
.mod-title { font-size:11px; letter-spacing:2.5px; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:1rem; }

/* DATE NAV */
.date-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.25rem; gap:8px; }
.date-pick-btn { flex:1; background:var(--gold-bg); border:0.5px solid var(--gold-bdr); border-radius:10px; padding:.625rem .875rem; cursor:pointer; text-align:center; }
.date-pick-btn .dn { font-size:15px; font-weight:500; color:#1A1A1A; }
.date-pick-btn .dp-hint { font-size:11px; color:var(--gold); margin-top:2px; letter-spacing:.5px; }
.nav-btn { background:none; border:0.5px solid var(--border); border-radius:8px; padding:8px 14px; font-size:16px; cursor:pointer; color:var(--muted); flex-shrink:0; }
.nav-btn:active { background:var(--surface); }
.nav-btn:disabled { opacity:.3; cursor:default; }

/* CALENDAR OVERLAY */
.cal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:200; display:flex; align-items:center; justify-content:center; padding:1rem; }
.cal-popup { background:#fff; border-radius:16px; padding:1.25rem; width:320px; max-width:100%; }
.cal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; }
.cal-header .cal-month { font-size:15px; font-weight:500; text-transform:capitalize; }
.cal-nav { background:none; border:0.5px solid var(--border); border-radius:8px; padding:7px 13px; cursor:pointer; font-size:14px; color:var(--muted); }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
.cal-day-hdr { text-align:center; font-size:11px; color:var(--hint); font-weight:600; padding:4px 0; }
.cal-day-hdr.open { color:var(--gold); }
.cal-day { display:flex; justify-content:center; align-items:center; height:40px; }
.cal-day-btn { width:36px; height:36px; border-radius:50%; border:none; font-size:14px; cursor:pointer; background:transparent; color:#1A1A1A; font-weight:400; position:relative; }
.cal-day-btn.open-day { font-weight:500; }
.cal-day-btn.selected { background:var(--gold); color:#fff; }
.cal-day-btn.today:not(.selected)::after { content:''; position:absolute; bottom:4px; left:50%; transform:translateX(-50%); width:4px; height:4px; border-radius:50%; background:var(--gold); }
.cal-day-btn.closed-day { color:var(--hint); cursor:default; opacity:.4; }
.cal-day-btn.future-day { opacity:.3; cursor:default; }
.cal-day-btn:disabled { cursor:default; }
.cal-footer { margin-top:1rem; display:flex; justify-content:space-between; align-items:center; }
.cal-legend { font-size:11px; color:var(--hint); }
.cal-legend span { color:var(--gold); font-weight:600; }
.cal-close { background:none; border:0.5px solid var(--border); border-radius:8px; padding:7px 14px; font-size:13px; color:var(--muted); cursor:pointer; }

.section-card { background:#fff; border:0.5px solid var(--border); border-radius:12px; padding:1rem; margin-bottom:.875rem; }
.sh { font-size:13px; font-weight:500; margin-bottom:.875rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:6px; }
.badge { font-size:11px; padding:3px 9px; border-radius:20px; background:var(--gold-bg); color:var(--gold-txt); border:0.5px solid var(--gold-bdr); }
.saved-bar { background:var(--green-bg); border:0.5px solid var(--green-bdr); border-radius:8px; padding:.875rem 1rem; font-size:13px; color:var(--green-txt); text-align:center; margin-bottom:1rem; }
.saved-bar strong { display:block; font-size:15px; margin-bottom:2px; }
.opmerking-box { margin-bottom:1rem; }
.opmerking-box label { font-size:12px; color:var(--muted); display:block; margin-bottom:6px; }
.opmerking-box textarea { width:100%; border:0.5px solid var(--border); border-radius:8px; padding:10px 12px; font-size:14px; background:#fff; color:#1A1A1A; resize:none; outline:none; font-family:inherit; line-height:1.5; }
.opmerking-box textarea:focus { border-color:var(--gold); }
.warn-label { font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--red); font-weight:600; display:block; margin-bottom:6px; }
.action-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:1.5rem; }
.save-btn  { background:var(--gold); color:#fff; border:none; border-radius:8px; padding:15px; font-size:16px; font-weight:500; cursor:pointer; }
.save-btn:active { opacity:.85; }
.clear-btn { background:none; border:0.5px solid var(--border); border-radius:8px; padding:15px; font-size:16px; color:var(--muted); cursor:pointer; }
.field-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
.field { display:flex; flex-direction:column; gap:4px; }
.field label { font-size:11px; color:var(--muted); }
.field .inp-wrap { display:flex; align-items:center; gap:4px; background:var(--surface); border:0.5px solid var(--border); border-radius:8px; padding:8px 10px; }
.field .inp-wrap span { font-size:14px; color:var(--hint); }
.field input { background:transparent; border:none; outline:none; font-size:16px; font-weight:500; width:100%; color:#1A1A1A; }
.field.computed .inp-wrap { background:var(--gold-bg); border-color:var(--gold-bdr); }
.field.computed input { color:var(--gold-txt); }
.field.computed label { color:#8B6914; }

/* PIN */
.tx-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; margin-bottom:1rem; }
@media(min-width:480px){ .tx-grid { grid-template-columns:repeat(5,minmax(0,1fr)); } }
.tx-cell { background:var(--surface); border:0.5px solid var(--border); border-radius:8px; padding:.7rem .8rem; transition:border-color .15s,background .15s; }
.tx-cell.has-val { border-color:#4CAF50; background:#F1F8E9; }
.tx-cell label { font-size:11px; color:var(--muted); display:block; margin-bottom:4px; }
.tx-cell.has-val label { color:#388E3C; }
.euro-wrap { display:flex; align-items:center; gap:3px; }
.esym { font-size:14px; color:var(--hint); }
.tx-cell.has-val .esym { color:#388E3C; }
.tx-cell input { background:transparent; border:none; outline:none; font-size:16px; font-weight:500; width:100%; color:#1A1A1A; }
.tx-cell.has-val input { color:#1B5E20; }
.totaal-card { background:var(--gold-bg); border:0.5px solid var(--gold-bdr); border-radius:12px; padding:1rem 1.25rem; display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; }
.totaal-label { font-size:12px; color:#8B6914; text-transform:uppercase; letter-spacing:1px; font-weight:600; }
.totaal-val { font-size:26px; font-weight:400; color:var(--gold-txt); }

/* CADEAUBONNEN */
.bon-list { display:flex; flex-direction:column; gap:8px; margin-bottom:1rem; }
.bon-item { background:var(--surface); border:0.5px solid var(--border); border-radius:10px; padding:.875rem 1rem; }
.bi-top { display:flex; align-items:center; justify-content:space-between; gap:8px; }
.bi-num { font-size:13px; font-weight:600; color:var(--gold); }
.bi-detail { font-size:13px; color:var(--muted); margin-top:3px; }
.bi-tag { font-size:11px; padding:3px 8px; border-radius:20px; font-weight:500; }
.bi-tag.gepind  { background:#E3F2FD; color:#1565C0; border:0.5px solid #90CAF9; }
.bi-tag.contant { background:var(--green-bg); color:var(--green-txt); border:0.5px solid var(--green-bdr); }
.bon-del { background:none; border:none; cursor:pointer; color:var(--hint); font-size:18px; padding:2px 6px; }
.add-bon-btn { width:100%; padding:.75rem; border:1px dashed var(--border); border-radius:10px; background:transparent; color:var(--muted); font-size:14px; cursor:pointer; margin-bottom:1rem; }
.add-bon-btn:hover { border-color:var(--gold); color:var(--gold); }
.bon-form { background:var(--surface); border:0.5px solid var(--border); border-radius:10px; padding:1rem; margin-bottom:1rem; display:flex; flex-direction:column; gap:10px; }
.bon-form label { font-size:12px; color:var(--muted); display:block; margin-bottom:3px; }
.bon-form input { width:100%; border:0.5px solid var(--border); border-radius:8px; padding:10px 12px; font-size:15px; background:#fff; color:#1A1A1A; outline:none; font-family:inherit; }
.bon-form input:focus { border-color:var(--gold); }
.bon-amt-wrap { display:flex; align-items:center; gap:4px; border:0.5px solid var(--border); border-radius:8px; padding:10px 12px; background:#fff; }
.bon-amt-wrap span { color:var(--hint); font-size:14px; }
.bon-amt-wrap input { border:none; outline:none; font-size:15px; font-weight:500; width:100%; background:transparent; color:#1A1A1A; }
.toggle-group { display:flex; border:0.5px solid var(--border); border-radius:8px; overflow:hidden; }
.toggle-opt { flex:1; padding:10px; border:none; background:#fff; font-size:14px; cursor:pointer; color:var(--muted); font-weight:500; }
.toggle-opt.on { background:var(--gold); color:#fff; }
.bon-summary { background:var(--gold-bg); border:0.5px solid var(--gold-bdr); border-radius:10px; padding:.875rem 1rem; display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; }
.bon-summary .bsl { font-size:12px; color:#8B6914; text-transform:uppercase; letter-spacing:1px; font-weight:600; }
.bon-summary .bsv { font-size:20px; font-weight:500; color:var(--gold-txt); }

/* KASAFROMING */
.pm-grid-3 { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; }
.pm-cell { background:var(--surface); border:0.5px solid var(--border); border-radius:8px; padding:.75rem; }
.pm-cell .pm-lbl { font-size:11px; color:var(--muted); margin-bottom:2px; }
.pm-cell .pm-std { font-size:10px; color:var(--hint); margin-bottom:6px; }
.pm-cell .pm-e   { font-size:11px; color:var(--hint); margin-bottom:2px; }
.pm-cell input   { background:transparent; border:none; outline:none; font-size:18px; font-weight:500; width:100%; color:#1A1A1A; }
.pm-cell.ok    { border-color:var(--green-bdr); background:var(--green-bg); }
.pm-cell.ok .pm-lbl { color:var(--green-txt); }
.pm-cell.ok input   { color:#1B5E20; }
.pm-cell.short { border-color:var(--red-bdr); background:var(--red-bg); }
.pm-cell.short .pm-lbl { color:var(--red); }
.pm-cell.short input   { color:var(--red); }
.totaal-blok { border-radius:12px; padding:1rem; margin-bottom:.875rem; }
.totaal-blok.neutraal  { background:var(--gold-bg);  border:0.5px solid var(--gold-bdr); }
.totaal-blok.positief  { background:var(--green-bg); border:0.5px solid var(--green-bdr); }
.totaal-blok.negatief  { background:var(--red-bg);   border:0.5px solid var(--red-bdr); }
.tot-row { display:flex; justify-content:space-between; align-items:center; padding:5px 0; }
.tot-row:not(:last-child) { border-bottom:0.5px solid rgba(0,0,0,0.06); }
.tot-row .tl { font-size:13px; color:var(--muted); }
.tot-row .tv { font-size:15px; font-weight:500; }
.tot-row.highlight .tl { font-weight:500; color:#1A1A1A; }
.tot-row.highlight .tv { font-size:20px; }
.tv.pos { color:var(--green-txt); } .tv.neg { color:var(--red); } .tv.zero { color:var(--gold); }
.pm-block { border:0.5px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:.875rem; }
.pm-header { background:var(--surface); padding:.75rem 1rem; display:flex; justify-content:space-between; align-items:center; border-bottom:0.5px solid var(--border); flex-wrap:wrap; gap:4px; }
.pm-header .pm-name { font-size:14px; font-weight:500; }
.pm-header .pm-tot  { font-size:13px; color:var(--gold); font-weight:500; }
.coupon-row { display:flex; align-items:center; padding:.625rem 1rem; border-bottom:0.5px solid var(--border); }
.coupon-row:last-child { border-bottom:none; }
.coupon-row.tekort { background:var(--red-bg); }
.col-coup { flex:0 0 70px; font-size:14px; font-weight:500; }
.col-std  { flex:0 0 72px; font-size:12px; color:var(--muted); text-align:center; }
.col-huid { flex:0 0 110px; display:flex; align-items:center; justify-content:center; gap:8px; }
.qty-btn  { width:34px; height:34px; border-radius:50%; border:0.5px solid var(--border); background:#fff; font-size:20px; color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center; }
.qty-btn:active { background:var(--gold-bg); }
.qty-val  { font-size:18px; font-weight:500; min-width:28px; text-align:center; }
.coupon-row.tekort .qty-val { color:var(--red); }
.col-wrd  { flex:1; text-align:right; font-size:13px; color:var(--muted); }
.col-stat { flex:0 0 68px; text-align:right; }
.tekort-badge { background:var(--red-bg); color:var(--red); border:0.5px solid var(--red-bdr); border-radius:20px; padding:2px 8px; font-size:11px; font-weight:500; }
.ok-badge { color:var(--green-txt); font-size:16px; }
.week-info { background:var(--gold-bg); border:0.5px solid var(--gold-bdr); border-radius:12px; padding:.875rem 1rem; margin-bottom:1rem; font-size:13px; color:var(--gold-txt); }
.week-info strong { display:block; margin-bottom:2px; }
.mgr-table { width:100%; border-collapse:collapse; font-size:13px; }
.mgr-table th { text-align:left; padding:7px 10px; font-size:11px; color:var(--muted); font-weight:600; border-bottom:0.5px solid var(--border); text-transform:uppercase; letter-spacing:.5px; }
.mgr-table td { padding:9px 10px; border-bottom:0.5px solid var(--border); }
.mgr-table tr:hover td { background:var(--surface); }
.chip { display:inline-block; font-size:12px; padding:3px 9px; border-radius:20px; font-weight:500; }
.chip.pos  { background:var(--green-bg); color:var(--green-txt); border:0.5px solid var(--green-bdr); }
.chip.neg  { background:var(--red-bg);   color:var(--red);       border:0.5px solid var(--red-bdr); }
.chip.zero { background:var(--gold-bg);  color:var(--gold-txt);  border:0.5px solid var(--gold-bdr); }
.month-stats { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; margin-bottom:1rem; }
.ms-card { background:var(--surface); border-radius:8px; padding:.75rem; text-align:center; }
.ms-card .ml { font-size:11px; color:var(--muted); margin-bottom:4px; }
.ms-card .mv { font-size:17px; font-weight:500; }
.ms-card .mv.gold { color:var(--gold); } .ms-card .mv.red { color:var(--red); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="screen active">
  <div class="login-inner">
    <div class="brand">
      <div class="brand-sub">The</div>
      <div class="brand-name">Sushi Boutique</div>
      <div class="brand-sub" style="letter-spacing:3px;margin-top:2px;">Dashboard</div>
    </div>
    <div style="text-align:center;width:100%">
      <div class="pin-dots"><div class="dot" id="d0"></div><div class="dot" id="d1"></div><div class="dot" id="d2"></div><div class="dot" id="d3"></div></div>
      <div class="pin-err" id="perr"></div>
    </div>
    <div class="pad" id="pad">
      <button class="pbtn" data-n="1">1</button><button class="pbtn" data-n="2">2</button><button class="pbtn" data-n="3">3</button>
      <button class="pbtn" data-n="4">4</button><button class="pbtn" data-n="5">5</button><button class="pbtn" data-n="6">6</button>
      <button class="pbtn" data-n="7">7</button><button class="pbtn" data-n="8">8</button><button class="pbtn" data-n="9">9</button>
      <button class="pbtn sm" data-n="del">wis</button><button class="pbtn" data-n="0">0</button><button class="pbtn sm" data-n="clr">✕</button>
    </div>
    <div class="login-hint">Demo: <strong>1111</strong> Medewerker &nbsp;·&nbsp; <strong>3333</strong> Manager &nbsp;·&nbsp; <strong>4444</strong> Eigenaar</div>
  </div>
</div>

<!-- APP -->
<div id="app" class="screen">
  <div class="app-header">
    <div class="header-left"><div class="role-tag" id="rtag"></div><div class="uname" id="uname"></div></div>
    <button class="out-btn" id="obtn">Uitloggen</button>
  </div>
  <div class="app-content" id="content"></div>
  <nav class="bottom-nav">
    <button class="bnav-btn active" data-tab="pin" id="bnav-pin">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      Pincontrole
    </button>
    <button class="bnav-btn" data-tab="kas" id="bnav-kas">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      Kasafroming
    </button>
  </nav>
</div>

<script>
// ════ CONFIG ════════════════════════════════════════
const USERS = {
  '1111':{name:'Medewerker',role:'medewerker',lvl:1},
  '2222':{name:'Bezorger',role:'bezorger',lvl:1},
  '3333':{name:'Manager',role:'manager',lvl:3},
  '4444':{name:'Eigenaar',role:'eigenaar',lvl:4}
};
// Openingsdagen: 0=zo, 3=wo, 4=do, 5=vr, 6=za
const OPEN_DAYS = new Set([0, 3, 4, 5, 6]);
const DAG_NL = ['zo','ma','di','wo','do','vr','za'];

const PM_SAM = [
  {label:'€ 20',   waarde:20,   standaard:1},
  {label:'€ 10',   waarde:10,   standaard:2},
  {label:'€ 5',    waarde:5,    standaard:2},
  {label:'€ 2',    waarde:2,    standaard:3},
  {label:'€ 1',    waarde:1,    standaard:4},
  {label:'€ 0,50', waarde:0.50, standaard:4},
  {label:'€ 0,20', waarde:0.20, standaard:5},
];
const KAS_SAM = [
  {label:'€ 20',   waarde:20,   standaard:1},
  {label:'€ 10',   waarde:10,   standaard:2},
  {label:'€ 5',    waarde:5,    standaard:2},
  {label:'€ 2',    waarde:2,    standaard:5},
  {label:'€ 1',    waarde:1,    standaard:5},
  {label:'€ 0,50', waarde:0.50, standaard:4},
  {label:'€ 0,20', waarde:0.20, standaard:5},
];
const BLOKKEN = [
  {id:'pm1',naam:'Portemonnee 1',sam:PM_SAM},
  {id:'pm2',naam:'Portemonnee 2',sam:PM_SAM},
  {id:'pm3',naam:'Portemonnee 3',sam:PM_SAM},
  {id:'kas',naam:'Kassa wisselgeld',sam:KAS_SAM},
];
const PM_STD     = PM_SAM.reduce((s,r)=>s+r.waarde*r.standaard,0);
const KAS_WISSEL = KAS_SAM.reduce((s,r)=>s+r.waarde*r.standaard,0);

// ════ STATE ══════════════════════════════════════════
let pin='', user=null, activeTab='pin';
let pinSubTab='transacties', pinDate=lastOpenDay();
let kasSubTab='dag', kasDate=lastOpenDay(), weekSt={};
let showBonForm=false, bonBetaalwijze='gepind';

// ════ DATE HELPERS ════════════════════════════════════
function lastOpenDay(){
  const d=new Date();
  while(!OPEN_DAYS.has(d.getDay())) d.setDate(d.getDate()-1);
  return d;
}
function prevOpenDay(d){
  const p=new Date(d);
  do { p.setDate(p.getDate()-1); } while(!OPEN_DAYS.has(p.getDay()));
  return p;
}
function nextOpenDay(d){
  const n=new Date(d), today=new Date();
  today.setHours(23,59,59,999);
  do { n.setDate(n.getDate()+1); } while(!OPEN_DAYS.has(n.getDay()));
  return n <= today ? n : null;
}
const dKey     = d => d.toISOString().split('T')[0];
const todayKey = () => new Date().toISOString().split('T')[0];
const isToday  = d => dKey(d) === todayKey();
const fmtDate  = d => d.toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long'});
const fmtShort = d => d.toLocaleDateString('nl-NL',{day:'numeric',month:'short'});
const fmt2     = n => n.toFixed(2).replace('.',',');

// ════ STORAGE — Firebase (productie) + localStorage (fallback) ════════════
async function dbSave(k, v) {
  if (window._fbReady) {
    try { await window._fbSave("dashboard/" + k.replace(/:/g, "_"), v); return; }
    catch(e) { console.warn("Firebase save mislukt", e); }
  }
  try { localStorage.setItem(k, JSON.stringify(v)); } catch(_) {}
}
async function dbLoad(k) {
  if (window._fbReady) {
    try { const d = await window._fbLoad("dashboard/" + k.replace(/:/g, "_")); return d; }
    catch(e) { console.warn("Firebase load mislukt", e); }
  }
  try {
    try { const r = await window.storage.get(k); return r ? JSON.parse(r.value) : null; } catch(_) {}
    const raw = localStorage.getItem(k); return raw ? JSON.parse(raw) : null;
  } catch(_) { return null; }
}

// ════ CALENDAR ════════════════════════════════════════
function showCalendar(currentDate, onSelect){
  document.getElementById('cal-overlay')?.remove();
  let cy=currentDate.getFullYear(), cm=currentDate.getMonth();

  function render(){
    document.getElementById('cal-overlay')?.remove();
    const today=new Date(); today.setHours(23,59,59,999);
    const firstDay=new Date(cy,cm,1).getDay();
    const daysInMonth=new Date(cy,cm+1,0).getDate();
    const monthName=new Date(cy,cm,1).toLocaleDateString('nl-NL',{month:'long',year:'numeric'});

    let dayCells='';
    // headers
    [0,1,2,3,4,5,6].forEach(i=>{
      const isOpen=OPEN_DAYS.has(i);
      dayCells+=`<div class="cal-day-hdr${isOpen?' open':''}">${DAG_NL[i]}</div>`;
    });
    // empty cells
    for(let i=0;i<firstDay;i++) dayCells+='<div class="cal-day"></div>';
    // days
    for(let d=1;d<=daysInMonth;d++){
      const date=new Date(cy,cm,d);
      const dow=date.getDay();
      const isOpen=OPEN_DAYS.has(dow);
      const isFut=date>today;
      const isSel=dKey(date)===dKey(currentDate);
      const isTod=dKey(date)===todayKey();
      const disabled=!isOpen||isFut;
      let cls='cal-day-btn';
      if(isSel) cls+=' selected';
      else if(isTod) cls+=' today';
      if(!isOpen) cls+=' closed-day';
      else if(isFut) cls+=' future-day';
      else cls+=' open-day';
      dayCells+=`<div class="cal-day"><button class="${cls}" ${disabled?'disabled':''} data-day="${d}">${d}</button></div>`;
    }

    const overlay=document.createElement('div');
    overlay.id='cal-overlay';
    overlay.className='cal-overlay';
    overlay.innerHTML=`<div class="cal-popup">
      <div class="cal-header">
        <button class="cal-nav" id="cal-pm">‹</button>
        <div class="cal-month">${monthName}</div>
        <button class="cal-nav" id="cal-nm">›</button>
      </div>
      <div class="cal-grid">${dayCells}</div>
      <div class="cal-footer">
        <div class="cal-legend">open: <span>wo vr za zo</span></div>
        <button class="cal-close" id="cal-close">Sluiten</button>
      </div>
    </div>`;
    document.body.appendChild(overlay);

    overlay.addEventListener('click',e=>{ if(e.target===overlay) overlay.remove(); });
    document.getElementById('cal-close').addEventListener('click',()=>overlay.remove());
    document.getElementById('cal-pm').addEventListener('click',()=>{ cm--; if(cm<0){cm=11;cy--;} render(); });
    document.getElementById('cal-nm').addEventListener('click',()=>{ cm++; if(cm>11){cm=0;cy++;} render(); });
    overlay.querySelectorAll('.cal-day-btn:not([disabled])').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const selected=new Date(cy,cm,parseInt(btn.dataset.day));
        overlay.remove();
        onSelect(selected);
      });
    });
  }
  render();
}

// ════ DATE NAV COMPONENT ═════════════════════════════
function renderDateNav(date, onPrev, onNext, onPick){
  const nextD=nextOpenDay(date);
  return `<div class="date-nav">
    <button class="nav-btn" id="dn-prev">‹</button>
    <button class="date-pick-btn" id="dn-pick">
      <div class="dn">${fmtDate(date)}</div>
      <div class="dp-hint">▼ kies dag</div>
    </button>
    <button class="nav-btn" id="dn-next" ${!nextD?'disabled':''}>›</button>
  </div>`;
}
function bindDateNav(date, setDate, rerender){
  document.getElementById('dn-prev').addEventListener('click',()=>{ setDate(prevOpenDay(date)); rerender(); });
  const nb=document.getElementById('dn-next');
  if(nb&&!nb.disabled) nb.addEventListener('click',()=>{ const n=nextOpenDay(date); if(n){setDate(n);rerender();} });
  document.getElementById('dn-pick').addEventListener('click',()=>{
    showCalendar(date, d=>{ setDate(d); rerender(); });
  });
}

// ════ LOGIN ══════════════════════════════════════════
function updateDots(){ for(let i=0;i<4;i++) document.getElementById('d'+i).classList.toggle('filled',i<pin.length); }
document.getElementById('pad').addEventListener('click',e=>{
  const b=e.target.closest('.pbtn'); if(!b) return;
  const n=b.dataset.n;
  document.getElementById('perr').textContent='';
  if(n==='del') pin=pin.slice(0,-1);
  else if(n==='clr') pin='';
  else if(pin.length<4) pin+=n;
  updateDots();
  if(pin.length===4){
    const u=USERS[pin];
    if(u){ user=u; showApp(); }
    else{ document.getElementById('perr').textContent='Pincode onjuist';
      setTimeout(()=>{pin='';updateDots();document.getElementById('perr').textContent='';},900); }
  }
});
document.getElementById('obtn').addEventListener('click',()=>{
  pin='';user=null;
  document.getElementById('login').classList.add('active');
  document.getElementById('app').classList.remove('active');
  updateDots();
});
function showApp(){
  document.getElementById('login').classList.remove('active');
  document.getElementById('app').classList.add('active');
  document.getElementById('rtag').textContent=user.role.charAt(0).toUpperCase()+user.role.slice(1);
  document.getElementById('uname').textContent=user.name;
  switchTab('pin');
}

// ════ NAVIGATION ═════════════════════════════════════
document.querySelector('.bottom-nav').addEventListener('click',e=>{
  const btn=e.target.closest('.bnav-btn'); if(!btn) return;
  switchTab(btn.dataset.tab);
});
function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.bnav-btn').forEach(b=>{
    const on=b.dataset.tab===tab;
    b.classList.toggle('active',on);
    b.querySelector('svg').style.stroke=on?'var(--gold)':'#999';
  });
  renderContent();
}
function renderContent(){ if(activeTab==='pin') renderPin(); else renderKas(); }

// ════ PINCONTROLE ═════════════════════════════════════
async function renderPin(){
  const c=document.getElementById('content');
  const tabs=user.lvl>=3
    ?[{k:'transacties',l:'Pintransacties'},{k:'cadeaubonnen',l:'Cadeaubonnen'},{k:'mgr',l:'Overzicht'}]
    :[{k:'transacties',l:'Pintransacties'},{k:'cadeaubonnen',l:'Cadeaubonnen'}];
  c.innerHTML=`<div class="mod-title">Pincontrole</div>
    <div class="mod-tab-row">${tabs.map(t=>`<button class="mod-tab ${pinSubTab===t.k?'on':''}" data-pt="${t.k}">${t.l}</button>`).join('')}</div>
    <div id="ptc"></div>`;
  c.querySelectorAll('[data-pt]').forEach(b=>b.addEventListener('click',()=>{pinSubTab=b.dataset.pt;renderPin();}));
  const ptc=document.getElementById('ptc');
  if(pinSubTab==='transacties') await renderPinTx(ptc);
  else if(pinSubTab==='cadeaubonnen') await renderBonnen(ptc);
  else await renderPinMgr(ptc);
}

async function renderPinTx(tc){
  const data=await dbLoad('pin:'+dKey(pinDate))||{txs:Array(10).fill(''),opmerking:'',bonnen:[],saved:false};
  const total=data.txs.reduce((s,v)=>s+(parseFloat(v)||0),0);
  let cells='';
  for(let i=0;i<10;i++){
    const v=data.txs[i]||''; const has=(parseFloat(v)||0)>0;
    cells+=`<div class="tx-cell${has?' has-val':''}"><label>Trans. ${i+1}</label>
      <div class="euro-wrap"><span class="esym">€</span>
        <input type="number" inputmode="decimal" step="0.01" min="0" placeholder="0,00" value="${v}" data-idx="${i}" ${data.saved?'readonly':''}></div></div>`;
  }
  tc.innerHTML=`${renderDateNav(pinDate)}
    ${data.saved?`<div class="saved-bar"><strong>Afgetekend ✓</strong>Door ${data.savedBy||'—'} om ${data.savedAt||'—'}</div>`:''}
    <div class="totaal-card"><div class="totaal-label">Totaal dag</div><div class="totaal-val" id="ptot">€ ${fmt2(total)}</div></div>
    <div class="tx-grid" id="txgrid">${cells}</div>
    <div class="opmerking-box">
      <label class="warn-label">⚠ Opmerking — schrijf bonnummer bij afwijkingen</label>
      <textarea id="popm" rows="2" placeholder="Bijv: bon 80 – cadeaubon + €17 gepind..." ${data.saved?'readonly':''}>${data.opmerking||''}</textarea>
    </div>
    ${!data.saved?`<div class="action-row"><button class="clear-btn" id="pcbtn">Wissen</button><button class="save-btn" id="psbtn">Dag opslaan ✓</button></div>`:''}`;
  bindDateNav(pinDate, d=>pinDate=d, ()=>renderPinTx(tc));
  if(!data.saved){
    tc.querySelectorAll('#txgrid input').forEach(inp=>{
      inp.addEventListener('input',()=>{
        let tot=0; tc.querySelectorAll('#txgrid input').forEach(i=>tot+=(parseFloat(i.value)||0));
        document.getElementById('ptot').textContent='€ '+fmt2(tot);
        inp.closest('.tx-cell').classList.toggle('has-val',(parseFloat(inp.value)||0)>0);
      });
    });
    document.getElementById('psbtn').addEventListener('click',async()=>{
      const txs=[]; tc.querySelectorAll('#txgrid input').forEach(i=>txs.push(i.value));
      const ex=await dbLoad('pin:'+dKey(pinDate))||{};
      const now=new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});
      await dbSave('pin:'+dKey(pinDate),{...ex,txs,opmerking:document.getElementById('popm').value,saved:true,savedBy:user.name,savedAt:now});
      await renderPinTx(tc);
    });
    document.getElementById('pcbtn').addEventListener('click',()=>{
      tc.querySelectorAll('#txgrid input').forEach(i=>{i.value='';i.closest('.tx-cell').classList.remove('has-val');});
      document.getElementById('popm').value='';
      document.getElementById('ptot').textContent='€ 0,00';
    });
  }
}

async function renderBonnen(tc){
  const data=await dbLoad('pin:'+dKey(pinDate))||{txs:Array(10).fill(''),opmerking:'',bonnen:[],saved:false};
  const bonnen=data.bonnen||[];
  const totaal=bonnen.reduce((s,b)=>s+(parseFloat(b.waarde)||0)+(parseFloat(b.bedrag)||0),0);
  const bonHtml=bonnen.length===0
    ?`<div style="text-align:center;padding:1.5rem;color:var(--hint);font-size:14px">Nog geen cadeaubonnen vandaag</div>`
    :bonnen.map((b,i)=>`<div class="bon-item">
        <div class="bi-top">
          <div><div class="bi-num">Bon #${b.bonnummer}</div>
            <div class="bi-detail">Waarde bon: € ${fmt2(parseFloat(b.waarde)||0)} &nbsp;+&nbsp; bijbetaald: € ${fmt2(parseFloat(b.bedrag)||0)}</div></div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="bi-tag ${b.betaalwijze}">${b.betaalwijze==='gepind'?'Gepind':'Contant'}</span>
            ${!data.saved?`<button class="bon-del" data-del="${i}">×</button>`:''}
          </div>
        </div></div>`).join('');

  const formHtml=showBonForm?`<div class="bon-form">
    <div><label>Bonnummer</label><input type="text" id="bon-nr" placeholder="Bijv. 042"></div>
    <div class="field-row">
      <div><label>Waarde cadeaubon</label><div class="bon-amt-wrap"><span>€</span><input type="number" inputmode="decimal" step="0.01" id="bon-waarde" placeholder="0,00"></div></div>
      <div><label>Bijbetaald bedrag</label><div class="bon-amt-wrap"><span>€</span><input type="number" inputmode="decimal" step="0.01" id="bon-bedrag" placeholder="0,00"></div></div>
    </div>
    <div><label>Betaalmethode bijbetaling</label>
      <div class="toggle-group">
        <button class="toggle-opt ${bonBetaalwijze==='gepind'?'on':''}" data-bw="gepind">Gepind</button>
        <button class="toggle-opt ${bonBetaalwijze==='contant'?'on':''}" data-bw="contant">Contant</button>
      </div>
    </div>
    <div class="action-row" style="margin-bottom:0">
      <button class="clear-btn" id="bon-cancel">Annuleren</button>
      <button class="save-btn" id="bon-add">Toevoegen</button>
    </div></div>`:'';

  tc.innerHTML=`${renderDateNav(pinDate)}
    ${data.saved?`<div class="saved-bar"><strong>Afgetekend ✓</strong>Door ${data.savedBy||'—'}</div>`:''}
    ${bonnen.length>0?`<div class="bon-summary"><div class="bsl">Dagtotaal cadeaubonnen</div><div class="bsv">€ ${fmt2(totaal)}</div></div>`:''}
    <div class="bon-list">${bonHtml}</div>
    ${!data.saved&&!showBonForm?`<button class="add-bon-btn" id="add-bon-btn">+ Cadeaubon toevoegen</button>`:''}
    ${formHtml}`;

  bindDateNav(pinDate, d=>pinDate=d, ()=>renderBonnen(tc));

  tc.querySelectorAll('[data-del]').forEach(btn=>btn.addEventListener('click',async()=>{
    const d2=await dbLoad('pin:'+dKey(pinDate))||{bonnen:[]};
    d2.bonnen=(d2.bonnen||[]).filter((_,j)=>j!==parseInt(btn.dataset.del));
    await dbSave('pin:'+dKey(pinDate),d2); await renderBonnen(tc);
  }));
  const addBtn=document.getElementById('add-bon-btn');
  if(addBtn) addBtn.addEventListener('click',()=>{showBonForm=true;renderBonnen(tc);});
  tc.querySelectorAll('[data-bw]').forEach(b=>b.addEventListener('click',()=>{
    bonBetaalwijze=b.dataset.bw;
    tc.querySelectorAll('[data-bw]').forEach(x=>x.classList.toggle('on',x.dataset.bw===bonBetaalwijze));
  }));
  const cancelBtn=document.getElementById('bon-cancel');
  if(cancelBtn) cancelBtn.addEventListener('click',()=>{showBonForm=false;renderBonnen(tc);});
  const addSave=document.getElementById('bon-add');
  if(addSave) addSave.addEventListener('click',async()=>{
    const nr=document.getElementById('bon-nr').value.trim();
    const waarde=document.getElementById('bon-waarde').value;
    const bedrag=document.getElementById('bon-bedrag').value;
    if(!nr){alert('Vul een bonnummer in');return;}
    if(!waarde||parseFloat(waarde)<=0){alert('Vul de waarde van de cadeaubon in');return;}
    const d2=await dbLoad('pin:'+dKey(pinDate))||{txs:Array(10).fill(''),opmerking:'',bonnen:[]};
    d2.bonnen=d2.bonnen||[];
    d2.bonnen.push({bonnummer:nr,waarde,bedrag:bedrag||'0',betaalwijze:bonBetaalwijze});
    await dbSave('pin:'+dKey(pinDate),d2); showBonForm=false; await renderBonnen(tc);
  });
}

async function renderPinMgr(tc){
  const d=pinDate, year=d.getFullYear(), month=d.getMonth();
  const days=new Date(year,month+1,0).getDate(); const entries=[];
  for(let i=1;i<=days;i++){const dd=new Date(year,month,i);if(dd>new Date())break;if(OPEN_DAYS.has(dd.getDay())){const r=await dbLoad('pin:'+dKey(dd));if(r)entries.push({date:dd,...r});}}
  const monthName=d.toLocaleDateString('nl-NL',{month:'long',year:'numeric'});
  let totPin=0,totBonnen=0;
  entries.forEach(e=>{totPin+=e.txs.reduce((s,v)=>s+(parseFloat(v)||0),0);totBonnen+=(e.bonnen||[]).length;});
  let rows='';
  if(!entries.length) rows=`<tr><td colspan="4" style="padding:1.5rem;text-align:center;color:var(--hint)">Geen data voor deze maand</td></tr>`;
  else entries.slice().reverse().forEach(e=>{
    const tot=e.txs.reduce((s,v)=>s+(parseFloat(v)||0),0);
    const nbon=(e.bonnen||[]).length;
    rows+=`<tr><td><strong>${fmtShort(e.date)}</strong><br><span style="font-size:11px;color:var(--hint)">${e.savedBy||''}</span></td>
      <td style="font-weight:500;color:var(--gold)">€ ${fmt2(tot)}</td>
      <td style="font-size:12px;color:var(--muted)">${e.txs.filter(v=>(parseFloat(v)||0)>0).length} trans.</td>
      <td>${nbon>0?`<span class="chip zero">${nbon} bon${nbon>1?'nen':''}</span>`:'<span style="color:var(--hint);font-size:12px">—</span>'}</td></tr>`;
  });
  tc.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.875rem;">
    <div style="font-size:15px;font-weight:500;text-transform:capitalize">${monthName}</div>
    <div style="display:flex;gap:6px;"><button class="nav-btn" id="mpm">‹</button><button class="nav-btn" id="mnm">›</button></div></div>
    <div class="month-stats">
      <div class="ms-card"><div class="ml">Totaal gepind</div><div class="mv gold">€ ${fmt2(totPin)}</div></div>
      <div class="ms-card"><div class="ml">Werkdagen</div><div class="mv">${entries.length}</div></div>
      <div class="ms-card"><div class="ml">Cadeaubonnen</div><div class="mv">${totBonnen}</div></div>
    </div>
    <div style="overflow-x:auto"><table class="mgr-table"><thead><tr><th>Datum</th><th>Pintotaal</th><th>Trans.</th><th>Bonnen</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  document.getElementById('mpm').addEventListener('click',()=>{pinDate=new Date(year,month-1,1);while(!OPEN_DAYS.has(pinDate.getDay()))pinDate.setDate(pinDate.getDate()+1);renderPinMgr(tc);});
  document.getElementById('mnm').addEventListener('click',()=>{const n=new Date(year,month+1,1);if(n<=new Date()){pinDate=n;while(!OPEN_DAYS.has(pinDate.getDay()))pinDate.setDate(pinDate.getDate()+1);renderPinMgr(tc);}});
}

// ════ KASAFROMING ════════════════════════════════════
async function renderKas(){
  const c=document.getElementById('content');
  const tabs=user.lvl>=3
    ?[{k:'dag',l:'Dagafsluiting'},{k:'week',l:'Weekafsluiting'},{k:'overzicht',l:'Overzicht'}]
    :[{k:'dag',l:'Dagafsluiting'},{k:'week',l:'Weekafsluiting'}];
  c.innerHTML=`<div class="mod-title">Kasafroming</div>
    <div class="mod-tab-row">${tabs.map(t=>`<button class="mod-tab ${kasSubTab===t.k?'on':''}" data-kt="${t.k}">${t.l}</button>`).join('')}</div>
    <div id="ktc"></div>`;
  c.querySelectorAll('[data-kt]').forEach(b=>b.addEventListener('click',()=>{kasSubTab=b.dataset.kt;renderKas();}));
  const ktc=document.getElementById('ktc');
  if(kasSubTab==='dag') await renderKasDag(ktc);
  else if(kasSubTab==='week') await renderKasWeek(ktc);
  else await renderKasOverzicht(ktc);
}

function calcKas(d){
  const es=parseFloat(d.eindstand)||0, afg=Math.max(0,es-KAS_WISSEL);
  const p1=parseFloat(d.pm1)||0,p2=parseFloat(d.pm2)||0,p3=parseFloat(d.pm3)||0;
  const tot=afg+p1+p2+p3, vw=parseFloat(d.verwacht)||0;
  return {es,afg,p1,p2,p3,tot,vw,verschil:vw>0?(tot-vw):null};
}

async function renderKasDag(tc){
  const data=await dbLoad('kas:'+dKey(kasDate))||{eindstand:'',pm1:'',pm2:'',pm3:'',verwacht:'',opmerking:'',saved:false};
  const t=calcKas(data);
  const vCls=t.verschil===null?'zero':t.verschil>=0?'pos':'neg';
  const vTxt=t.verschil===null?'—':(t.verschil>=0?'+':'')+fmt2(t.verschil);
  const bCls=t.verschil===null?'neutraal':t.verschil>=0?'positief':'negatief';
  const pmCls=v=>{const n=parseFloat(v)||0;return n===0?'':Math.abs(n-PM_STD)<0.01?'ok':'short';};
  tc.innerHTML=`${renderDateNav(kasDate)}
    ${data.saved?`<div class="saved-bar"><strong>Afgeroomd ✓</strong>Door ${data.savedBy||'—'} om ${data.savedAt||'—'}</div>`:''}
    <div class="section-card">
      <div class="sh">Kassa <span class="badge">Wisselgeld € ${fmt2(KAS_WISSEL)} blijft staan</span></div>
      <div class="field-row">
        <div class="field"><label>Eindstand kassa</label><div class="inp-wrap"><span>€</span><input type="number" inputmode="decimal" step="0.01" id="es" placeholder="0,00" value="${data.eindstand}" ${data.saved?'readonly':''}></div></div>
        <div class="field computed"><label>Afgeroomd (auto)</label><div class="inp-wrap"><span>€</span><input type="text" id="afg" value="${fmt2(t.afg)}" readonly></div></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Verwacht contant totaal</label><div class="inp-wrap"><span>€</span><input type="number" inputmode="decimal" step="0.01" id="vw" placeholder="optioneel" value="${data.verwacht}" ${data.saved?'readonly':''}></div></div>
      </div>
    </div>
    <div class="section-card">
      <div class="sh">Portemonnees <span class="badge">Standaard € ${fmt2(PM_STD)} p/st</span></div>
      <div class="pm-grid-3">${[1,2,3].map(i=>{
        const v=data['pm'+i]||'',diff=(parseFloat(v)||0)-PM_STD;
        return `<div class="pm-cell ${pmCls(v)}" id="pmc${i}">
          <div class="pm-lbl">Portemonnee ${i}</div><div class="pm-std">Std: € ${fmt2(PM_STD)}</div>
          <div class="pm-e">€</div>
          <input type="number" inputmode="decimal" step="0.01" id="pm${i}" placeholder="0,00" value="${v}" ${data.saved?'readonly':''}>
          ${(parseFloat(v)||0)>0&&Math.abs(diff)>0.01?`<div style="font-size:11px;margin-top:4px;color:${diff<0?'var(--red)':'var(--green-txt)'}">Verschil: € ${diff>0?'+':''}${fmt2(diff)}</div>`:''}
        </div>`;}).join('')}</div>
    </div>
    <div class="totaal-blok ${bCls}" id="kblok">
      <div class="tot-row"><div class="tl">Kas afgeroomd</div><div class="tv" id="tkv">€ ${fmt2(t.afg)}</div></div>
      <div class="tot-row"><div class="tl">Portemonnee 1</div><div class="tv" id="tp1">€ ${fmt2(t.p1)}</div></div>
      <div class="tot-row"><div class="tl">Portemonnee 2</div><div class="tv" id="tp2">€ ${fmt2(t.p2)}</div></div>
      <div class="tot-row"><div class="tl">Portemonnee 3</div><div class="tv" id="tp3">€ ${fmt2(t.p3)}</div></div>
      <div class="tot-row highlight"><div class="tl">Totaal contant</div><div class="tv zero" id="ttot">€ ${fmt2(t.tot)}</div></div>
      <div id="vrow">${t.vw>0?`<div class="tot-row highlight"><div class="tl">Verschil</div><div class="tv ${vCls}">€ ${vTxt}</div></div>`:''}</div>
    </div>
    <div class="opmerking-box"><label>Opmerking / toelichting</label><textarea id="kopm" rows="2" placeholder="Bijv: PM2 had €10 te weinig..." ${data.saved?'readonly':''}>${data.opmerking||''}</textarea></div>
    ${!data.saved?`<div class="action-row"><button class="clear-btn" id="kcbtn">Wissen</button><button class="save-btn" id="ksbtn">Afroming opslaan ✓</button></div>`:''}`;
  bindDateNav(kasDate, d=>kasDate=d, ()=>renderKasDag(tc));
  if(!data.saved){
    function recalc(){
      const es=parseFloat(document.getElementById('es').value)||0;
      const afg=Math.max(0,es-KAS_WISSEL);
      const p1=parseFloat(document.getElementById('pm1').value)||0;
      const p2=parseFloat(document.getElementById('pm2').value)||0;
      const p3=parseFloat(document.getElementById('pm3').value)||0;
      const vw=parseFloat(document.getElementById('vw').value)||0;
      const tot=afg+p1+p2+p3; const ver=vw>0?(tot-vw):null;
      document.getElementById('afg').value=fmt2(afg);
      document.getElementById('tkv').textContent='€ '+fmt2(afg);
      document.getElementById('tp1').textContent='€ '+fmt2(p1);
      document.getElementById('tp2').textContent='€ '+fmt2(p2);
      document.getElementById('tp3').textContent='€ '+fmt2(p3);
      document.getElementById('ttot').textContent='€ '+fmt2(tot);
      document.getElementById('kblok').className='totaal-blok '+(ver===null?'neutraal':ver>=0?'positief':'negatief');
      document.getElementById('vrow').innerHTML=vw>0?`<div class="tot-row highlight"><div class="tl">Verschil</div><div class="tv ${ver>=0?'pos':'neg'}">€ ${(ver>=0?'+':'')+fmt2(ver)}</div></div>`:'';
      [1,2,3].forEach(i=>{const v=[p1,p2,p3][i-1];document.getElementById('pmc'+i).className='pm-cell '+(v===0?'':Math.abs(v-PM_STD)<0.01?'ok':'short');});
    }
    ['es','pm1','pm2','pm3','vw'].forEach(id=>document.getElementById(id).addEventListener('input',recalc));
    document.getElementById('ksbtn').addEventListener('click',async()=>{
      const now=new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});
      await dbSave('kas:'+dKey(kasDate),{eindstand:document.getElementById('es').value,pm1:document.getElementById('pm1').value,pm2:document.getElementById('pm2').value,pm3:document.getElementById('pm3').value,verwacht:document.getElementById('vw').value,opmerking:document.getElementById('kopm').value,saved:true,savedBy:user.name,savedAt:now});
      await renderKasDag(tc);
    });
    document.getElementById('kcbtn').addEventListener('click',()=>{['es','pm1','pm2','pm3','vw'].forEach(id=>document.getElementById(id).value='');document.getElementById('kopm').value='';recalc();});
  }
}

async function renderKasWeek(tc){
  const wk='kasweek:'+dKey(kasDate).slice(0,8)+'00';
  const saved=await dbLoad(wk);
  if(!weekSt[wk]){weekSt[wk]={};BLOKKEN.forEach(b=>{weekSt[wk][b.id]=b.sam.map(r=>saved&&saved[b.id]?saved[b.id][r.label]??r.standaard:r.standaard);});}
  const ws=weekSt[wk]; const isSaved=saved&&saved.saved;
  function buildBlokken(){
    return BLOKKEN.map(b=>{
      const tot=ws[b.id].reduce((s,n,i)=>s+n*b.sam[i].waarde,0);
      const std=b.sam.reduce((s,r)=>s+r.waarde*r.standaard,0);
      const rows=b.sam.map((r,i)=>{
        const h=ws[b.id][i],tekort=h<r.standaard;
        return `<div class="coupon-row${tekort?' tekort':''}">
          <div class="col-coup">${r.label}</div><div class="col-std">${r.standaard}× std</div>
          <div class="col-huid">
            ${!isSaved?`<button class="qty-btn" data-blok="${b.id}" data-idx="${i}" data-act="min">−</button>`:''}
            <div class="qty-val">${h}</div>
            ${!isSaved?`<button class="qty-btn" data-blok="${b.id}" data-idx="${i}" data-act="plus">+</button>`:''}
          </div>
          <div class="col-wrd">€ ${fmt2(h*r.waarde)}</div>
          <div class="col-stat">${tekort?`<span class="tekort-badge">−${r.standaard-h}</span>`:`<span class="ok-badge">✓</span>`}</div>
        </div>`;
      }).join('');
      return `<div class="pm-block"><div class="pm-header"><div class="pm-name">${b.naam}</div><div class="pm-tot">€ ${fmt2(tot)} <span style="font-size:11px;color:var(--hint);font-weight:400">/ std € ${fmt2(std)}</span></div></div>${rows}</div>`;
    }).join('');
  }
  tc.innerHTML=`<div class="week-info"><strong>Portemonnees en kassa aanvullen</strong>Gebruik + en − per coupure. Tekorten worden rood gemarkeerd.</div>
    ${isSaved?`<div class="saved-bar"><strong>Afgetekend ✓</strong>Door ${saved.savedBy||'—'}</div>`:''}
    <div id="wblokken">${buildBlokken()}</div>
    <div class="opmerking-box"><label>Opmerking / wisselgeld bestellen</label><textarea id="wopm" rows="2" placeholder="Bijv: te weinig €2 munten — wisselgeld bestellen voor volgende week..." ${isSaved?'readonly':''}>${saved&&saved.opmerking||''}</textarea></div>
    ${!isSaved?`<div class="action-row"><button class="clear-btn" id="wreset">Reset</button><button class="save-btn" id="wsave">Weekafsluiting opslaan ✓</button></div>`:''}`;
  function bindQty(){tc.querySelectorAll('.qty-btn').forEach(btn=>btn.addEventListener('click',()=>{
    const b2=btn.dataset.blok,idx=parseInt(btn.dataset.idx),act=btn.dataset.act;
    if(act==='plus')ws[b2][idx]++; else if(act==='min'&&ws[b2][idx]>0)ws[b2][idx]--;
    document.getElementById('wblokken').innerHTML=buildBlokken(); bindQty();
  }));}
  bindQty();
  const ws2=document.getElementById('wsave');
  if(ws2) ws2.addEventListener('click',async()=>{
    const sd={saved:true,savedBy:user.name,opmerking:document.getElementById('wopm').value};
    BLOKKEN.forEach(b=>{sd[b.id]={};b.sam.forEach((r,i)=>{sd[b.id][r.label]=ws[b.id][i];});});
    await dbSave(wk,sd);delete weekSt[wk];await renderKasWeek(tc);
  });
  const wr=document.getElementById('wreset');
  if(wr) wr.addEventListener('click',async()=>{await dbSave(wk,{});delete weekSt[wk];await renderKasWeek(tc);});
}

async function renderKasOverzicht(tc){
  const year=kasDate.getFullYear(),month=kasDate.getMonth();
  const days=new Date(year,month+1,0).getDate(); const entries=[];
  for(let i=1;i<=days;i++){const dd=new Date(year,month,i);if(dd>new Date())break;if(OPEN_DAYS.has(dd.getDay())){const r=await dbLoad('kas:'+dKey(dd));if(r)entries.push({date:dd,...r});}}
  const monthName=kasDate.toLocaleDateString('nl-NL',{month:'long',year:'numeric'});
  let totAfg=0,totVer=0,aantalVerschil=0;
  entries.forEach(e=>{const t=calcKas(e);totAfg+=t.tot;if(t.verschil!==null){totVer+=t.verschil;if(Math.abs(t.verschil)>0.01)aantalVerschil++;}});
  let rows='';
  if(!entries.length) rows=`<tr><td colspan="4" style="padding:1.5rem;text-align:center;color:var(--hint)">Geen data voor deze maand</td></tr>`;
  else entries.slice().reverse().forEach(e=>{
    const t=calcKas(e);
    const vTxt=t.verschil===null?'—':(t.verschil>=0?'+':'')+fmt2(t.verschil);
    const vCls=t.verschil===null?'zero':Math.abs(t.verschil)<0.01?'zero':t.verschil>=0?'pos':'neg';
    rows+=`<tr><td><strong>${fmtShort(e.date)}</strong><br><span style="font-size:11px;color:var(--hint)">${e.savedBy||''} ${e.savedAt||''}</span></td>
      <td style="font-weight:500;color:var(--gold)">€ ${fmt2(t.tot)}</td>
      <td style="font-size:12px;color:var(--muted)">€${fmt2(t.p1)} · €${fmt2(t.p2)} · €${fmt2(t.p3)}</td>
      <td><span class="chip ${vCls}">€ ${vTxt}</span></td></tr>`;
  });
  tc.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.875rem;">
    <div style="font-size:15px;font-weight:500;text-transform:capitalize">${monthName}</div>
    <div style="display:flex;gap:6px;"><button class="nav-btn" id="kopm2">‹</button><button class="nav-btn" id="konm">›</button></div></div>
    <div class="month-stats">
      <div class="ms-card"><div class="ml">Totaal afgeroomd</div><div class="mv gold">€ ${fmt2(totAfg)}</div></div>
      <div class="ms-card"><div class="ml">Totaal verschil</div><div class="mv ${Math.abs(totVer)>0.01?'red':'gold'}">€ ${(totVer>=0?'+':'')+fmt2(totVer)}</div></div>
      <div class="ms-card"><div class="ml">Dagen met verschil</div><div class="mv ${aantalVerschil>0?'red':'gold'}">${aantalVerschil}</div></div>
    </div>
    <div style="overflow-x:auto"><table class="mgr-table"><thead><tr><th>Datum</th><th>Totaal</th><th>Portemonnees</th><th>Verschil</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  document.getElementById('kopm2').addEventListener('click',()=>{kasDate=new Date(year,month-1,28);renderKasOverzicht(tc);});
  document.getElementById('konm').addEventListener('click',()=>{const n=new Date(year,month+1,1);if(n<=new Date()){kasDate=n;renderKasOverzicht(tc);}});
}
</script>
